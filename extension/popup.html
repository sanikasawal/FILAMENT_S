<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Filament</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #0D0D0F;
      color: rgba(255,255,255,0.6);
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      font-size: 12px;
      padding: 24px 20px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .logo { opacity: 0.4; margin-bottom: 16px; }
    .title { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.8); margin-bottom: 6px; }
    .sub { font-size: 11px; color: rgba(255,255,255,0.3); line-height: 1.5; }
    .hint {
      margin-top: 16px;
      font-size: 9px;
      color: rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    key {
      padding: 1px 4px;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      font-family: 'SF Mono', monospace;
      font-size: 8px;
      color: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div class="title">Filament</div>
  <div class="sub">Look for the edge tab on the right side<br>of any page to open Filament.</div>
  <div class="hint"><key>&#x2318;</key><key>&#x21E7;</key><key>F</key> to toggle</div>
</body>
</html>
