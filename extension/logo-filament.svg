      <stop offset="0%"   stop-color="#4285F4"/>
      <stop offset="14%"  stop-color="#3BA0E8"/>
      <stop offset="28%"  stop-color="#00BFA5"/>
      <stop offset="42%"  stop-color="#34A853"/>
      <stop offset="56%"  stop-color="#8BC34A"/>
      <stop offset="70%"  stop-color="#FFB74D"/>
      <stop offset="85%"  stop-color="#FF8A65"/>
