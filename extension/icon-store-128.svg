<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4285F4"/>
      <stop offset="20%"  stop-color="#3BA0E8"/>
      <stop offset="40%"  stop-color="#00BFA5"/>
      <stop offset="60%"  stop-color="#34A853"/>
      <stop offset="75%"  stop-color="#FFB74D"/>
      <stop offset="90%"  stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#FF6F61"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="128" height="128" rx="24" ry="24" fill="url(#bg-grad)"/>
  <!-- Three flowing wave lines -->
  <path d="
    M 20,52
    C 30,52 35,38 48,38
    S 62,52 72,52
    S 85,38 95,38
    S 105,52 108,52
  " fill="none" stroke="url(#wave-grad)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.5"/>
  <path d="
    M 20,64
    C 30,64 35,50 48,50
    S 62,64 72,64
    S 85,50 95,50
    S 105,64 108,64
  " fill="none" stroke="url(#wave-grad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path d="
    M 20,76
    C 30,76 35,90 48,90
    S 62,76 72,76
    S 85,90 95,90
    S 105,76 108,76
  " fill="none" stroke="url(#wave-grad)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" opacity="0.5"/>
</svg>
